<!DOCTYPE html>
<html>
<head>
    <title>Тест JSONBin</title>
</head>
<body>
    <h2>Тест подключения</h2>
    <button onclick="test()">Проверить</button>
    <pre id="result"></pre>

    <script>
        const API_KEY = '$2a$10$DWV0FhJBA3jXAX8HDms6MuALT9NBDhI5iQSX.ZYLpF4fYOWHq1Y0C';
        const USERS_BIN_ID = '69e29ae4856a6821894647f4';
        const WHITELIST_BIN_ID = '69e29b0aaaba8821970e8018';

        async function test() {
            const res = document.getElementById('result');
            res.innerHTML = 'Проверяю...\n';
            
            try {
                const r1 = await fetch(`https://api.jsonbin.io/v3/b/${USERS_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data1 = await r1.json();
                res.innerHTML += `✅ Users бин: ${JSON.stringify(data1.record)}\n`;
                
                const r2 = await fetch(`https://api.jsonbin.io/v3/b/${WHITELIST_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data2 = await r2.json();
                res.innerHTML += `✅ Whitelist бин: ${JSON.stringify(data2.record)}\n`;
                
                res.innerHTML += `\n✅ ВСЁ РАБОТАЕТ! Можешь использовать основной код.`;
            } catch(e) {
                res.innerHTML += `❌ Ошибка: ${e.message}`;
            }
        }
    </script>
</body>
</html>
