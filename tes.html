<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JSONBin Test</title>
</head>
<body>
    <h2>JSONBin Connection Test</h2>
    <button onclick="test()">Check</button>
    <pre id="result"></pre>

    <script>
        const API_KEY = '$2a$10$DWV0FhJBA3jXAX8HDms6MuALT9NBDhI5iQSX.ZYLpF4fYOWHq1Y0C';
        const USERS_BIN_ID = '69e29ae4856a6821894647f4';
        const WHITELIST_BIN_ID = '69e29b0aaaba8821970e8018';

        async function test() {
            const res = document.getElementById('result');
            res.innerHTML = 'Loading...\n';
            
            try {
                const r1 = await fetch(`https://api.jsonbin.io/v3/b/${USERS_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data1 = await r1.json();
                res.innerHTML += 'OK Users bin\n';
                
                const r2 = await fetch(`https://api.jsonbin.io/v3/b/${WHITELIST_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data2 = await r2.json();
                res.innerHTML += 'OK Whitelist bin\n';
                
                res.innerHTML += '\nSUCCESS! Both bins work.';
            } catch(e) {
                res.innerHTML += 'ERROR: ' + e.message;
            }
        }
    </script>
</body>
</html>
